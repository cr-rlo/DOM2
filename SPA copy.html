<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 관리 시스템</title>
  <style>
    body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}

#app {
  max-width: 600px;
  margin: 0 auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.filter {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
}

.filter button {
  padding: 6px 12px;
  border: none;
  background: #ddd;
  border-radius: 5px;
  cursor: pointer;
}

.filter button.active {
  background: #4caf50;
  color: white;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0 0 20px 0;
}

li {
  background: #f9f9f9;
  padding: 10px 12px;
  border-left: 5px solid #ccc;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

li.done {
  text-decoration: line-through;
  color: #888;
  background: #e0e0e0;
}

li[data-tag="work"] {
  border-color: #2196f3;
}

li[data-tag="study"] {
  border-color: #ff9800;
}

li[data-tag="life"] {
  border-color: #9c27b0;
}

li button.delete {
  background: crimson;
  border: none;
  color: white;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
  margin-left: 10px;
  cursor: pointer;
}

.add-section {
  display: flex;
  gap: 10px;
}

input, select, button {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button#add-btn {
  background: #4caf50;
  color: white;
  border: none;
  cursor: pointer;
}
  </style>
</head>
<body>
  <div id="app">
  <h1>📝 할 일 관리 (SPA + 태그 필터 + 상태 저장)</h1>

  <div class="filter">
    <button data-tag="all" class="active">전체</button>
    <button data-tag="work">업무</button>
    <button data-tag="study">공부</button>
    <button data-tag="life">일상</button>
  </div>

  <ul id="todo-list"></ul>

  <div class="add-section">
    <input type="text" id="todo-input" placeholder="할 일을 입력하세요" />
    <select id="tag-select">
      <option value="work">업무</option>
      <option value="study">공부</option>
      <option value="life">일상</option>
    </select>
    <button id="add-btn">추가</button>
  </div>
</div>

<script>
const state = {
  // state는 실제 상태 데이터를 저장하는 객체로 todos 배열과 filter 속성을 포함하고 있음. todos 배열은 할 일 항목들을 저장하는 배열이고, filter 속성은 현재 선택된 필터를 나타내는 문자열을 저장함. 초기값으로 todos는 빈 배열로 설정되고, filter는 'all'로 설정되어 있어서 처음에는 모든 할 일 항목이 표시되도록 되어 있음
  todos: [],
  filter: 'all',
};

const proxyState = new Proxy(state, {
  // Proxy 객체는 state 객체를 감싸서 state에 대한 접근과 변경을 가로채는 역할을 함. 이렇게 하면 state의 todos 배열이나 filter 속성이 변경될 때마다 자동으로 render() 함수가 실행되고, 변경된 상태가 로컬스토리지에도 저장되도록 할 수 있음. Proxy의 set 트랩을 사용해서 state의 속성이 변경될 때마다 render()와 saveToStorage() 함수를 호출하도록 설정함
  set(target, prop, value) {
    // set 트랩은 상태가 변경될 때마다 실행되며 인자로 target(원래 객체), prop(변경된 속성), value(새로운 값)를 받음. 이 트랩에서 target[prop] = value;를 통해 실제로 상태를 업데이트한 후, render() 함수를 호출해서 화면을 갱신하고, saveToStorage() 함수를 호출해서 변경된 상태를 로컬스토리지에 저장함. 마지막으로 true를 반환해서 상태 변경이 성공적으로 처리되었음을 알림
    target[prop] = value;
    // target은 원래의 state 객체
    // prop은 변경된 속성의 이름(key) 예를들어 todos가 변경되면 prop은 'todos'가 됨
    // value는 변경된 속성(key)에 할당된 새로운 값(value). 예를들어 proxyState.filter = 'work'로 변경하면 value는 'work'가 됨
    // target[prop] = value;는 실제로 state 객체의 해당 속성을 새로운 값으로 업데이트하는 코드. 예를 들어, proxyState.todos = [...]로 변경하면 target['todos'] = [...]가 되어 state.todos가 새로운 배열로 업데이트됨

    render();
    // render() 함수는 상태가 변경될 때마다 화면을 갱신하는 역할을 함. 예를 들어, 할 일 항목이 추가되거나 삭제되거나 완료 상태가 변경될 때마다 render() 함수가 호출되어 화면에 변경된 상태가 반영되도록 함
    saveToStorage();
    // saveToStorage() 함수는 상태가 변경될 때마다 로컬스토리지에 변경된 상태를 저장하는 역할을 함. 예를 들어, 할 일 항목이 추가되거나 삭제되거나 완료 상태가 변경될 때마다 saveToStorage() 함수가 호출되어 변경된 상태가 로컬스토리지에 저장되도록 함
    return true;
  }

});

const $list = document.getElementById('todo-list');
const $input = document.getElementById('todo-input');
const $tag = document.getElementById('tag-select');
const $addBtn = document.getElementById('add-btn');
const $filterButtons = document.querySelector('.filter');

loadFromStorage();
// 페이지가 로드될 때 loadFromStorage() 함수를 호출해서 로컬스토리지에 저장된 할 일 항목들을 불러와서 화면에 표시함. 이렇게 하면 사용자가 이전에 저장한 할 일 항목들이 페이지를 새로고침하거나 브라우저를 닫았다가 다시 열어도 계속 유지되도록 할 수 있음
render();
// 페이지가 로드될 때 render() 함수를 호출해서 화면을 초기화함. 이렇게 하면 로컬스토리지에서 불러온 할 일 항목들이 화면에 표시되고, 초기 상태에 맞게 필터 버튼이 활성화되도록 할 수 있음

$addBtn.addEventListener('click', addTodo);
// 추가 버튼에 클릭 이벤트 리스너를 등록해서, 버튼이 클릭되면 addTodo() 함수가 실행되도록 함. 이렇게 하면 사용자가 할 일을 입력하고 추가 버튼을 클릭했을 때, 새로운 할 일 항목이 추가되고 화면이 갱신되도록 할 수 있음

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addTodo();
  // 입력창에 키다운 이벤트 리스너를 등록해서, 사용자가 Enter 키를 눌렀을 때 addTodo() 함수가 실행되도록 함. 이렇게 하면 사용자가 할 일을 입력한 후 Enter 키를 눌러서도 할 일 항목을 추가할 수 있도록 편리한 사용자 경험을 제공할 수 있음
});

$list.addEventListener('click', handleListClick);
// todo-list인 ul 요소에만 클릭 이벤트 리스너를 등록해서, ul 요소 안에서 발생하는 클릭 이벤트를 감지할 수 있도록 함. 이렇게 하면 각 할 일 항목(li 요소)에 개별적으로 이벤트 리스너를 등록할 필요 없이, ul 요소 하나에만 이벤트 리스너를 등록해서 모든 클릭 이벤트를 처리할 수 있음. 이벤트 위임을 활용한 방식

$filterButtons.addEventListener('click', (e) => {
  // 필터 버튼이 클릭되었을 때 실행되는 이벤트 핸들러. e.target은 실제로 클릭된 요소를 가리킴. 만약 클릭된 요소가 버튼이 아니라면, 함수 실행을 종료함. 이렇게 하면 버튼이 아닌 다른 요소가 클릭되었을 때는 아무런 동작도 하지 않도록 할 수 있음
  if (e.target.tagName !== 'BUTTON') return;
  // 클릭된 요소가 버튼이 아니라면 함수 실행을 종료함. 이렇게 하면 버튼이 아닌 다른 요소가 클릭되었을 때는 아무런 동작도 하지 않도록 할 수 있음. 예를 들어, 필터 버튼 영역에서 빈 공간이 클릭되었을 때는 아무런 동작도 하지 않도록 함
  proxyState.filter = e.target.dataset.tag;
  // 클릭된 버튼의 data-tag 속성 값을 proxyState.filter에 할당함. 예를 들어, "업무" 버튼이 클릭되면 e.target.dataset.tag는 "work"가 되고, proxyState.filter는 "work"로 업데이트됨. 이렇게 하면 현재 선택된 필터가 업데이트되고, Proxy의 set 트랩이 발동하여 화면에 표시되는 할 일 목록이 해당 태그에 맞게 필터링되어 업데이트됨
});


// 1. 할 일 추가 함수
function addTodo() {
  const text = $input.value.trim();
  // 입력 값에서 앞 뒤 공백을 제거한 후 text 변수에 저장
  // $는 DOM 요소를 가리키는 변수명으로 자주 사용되는 관례. $input은 할 일 입력창을 가리키는 변수, $tag는 태그 선택 드롭다운을 가리키는 변수. 굳이 $를 붙이는 이유는 이 변수가 DOM 요소임을 명확히 하기 위해서임. 

  const tag = $tag.value;
  // 선택된 태그의 값을 tag 변수에 저장. 예를 들어, "업무"가 선택되면 tag는 "work"가 됨

  if (!text) return alert('할 일을 입력하세요.');
  // 입력이 비어 있으면 alert로 경고 메세지를 띄우고 함수 종료

  const isDuplicate = proxyState.todos.some(todo => todo.text === text && todo.tag === tag);
  // proxtstate.todos 배열에서 some() 메서드를 이용해서 입력된 text와 tag가 이미 존재하는지 검사. some()는 배열에서 조건에 맞는 요소가 하나라도 있으면 true를 반환하는 메서드. 여기서는 todo.text가 입력된 text와 같고, todo.tag가 선택된 tag와 같은 요소가 있는지 검사함. 만약 있다면 isDuplicate는 true가 되고, 없다면 false가 됨
  if (isDuplicate) return alert('같은 태그에 동일한 내용이 존재합니다.');
  // isDuplicate가 true이면 중복된 요소가 있다는 의미이므로 alert로 경고 메세지를 띄우고 함수 종료

  const newTodo = { text, tag, done: false };
  // 중복된 할 일이 없으면 새로운 할 일 객체를 생성
  // newTodo 객체는 text, tag, done 속성을 가짐. text는 입력된 할 일 내용, tag는 선택된 태그, done은 완료 여부를 나타내며 초기값은 false로 설정됨
  proxyState.todos = [...proxyState.todos, newTodo];
  // 새로운 할 일 객체를 기존의 todos 배열에 추가. 기존의 todos 배열을 펼쳐서 새로운 객체를 뒤에 추가하는 방식으로 업데이트함. 이렇게 하면 Proxy의 set 트랩이 발동하여 화면이 자동으로 업데이트되고, 변경된 상태가 로컬스토리지에도 저장됨
  // push말고 => proxyState.todos = [...proxyState.todos, newTodo]로 하는 이유는 Proxy의 set 트랩이 배열의 push 메서드로는 감지되지 않기 때문. 배열을 새로 만들어서 할 일 객체를 추가하는 방식으로 업데이트해야 Proxy가 변경을 감지할 수 있음
  // proxyState에 render()와 saveToStorage()가 연결되어 있기 때문에, todos 배열이 업데이트되면 자동으로 화면이 갱신되고, 변경된 상태가 로컬스토리지에 저장됨

  $input.value = '';
  // 입력창 초기화
}

// 2. 할 일 완료/삭제 함수
function handleListClick(e) {
  const $target = e.target;
  // 실제로 클릭한 요소를 $target 변수에 저장. 예를 들어, 삭제 버튼이 클릭되면 $target은 그 버튼 요소가 됨
  // 클릭된 버튼을 $target으로 저장한 이유는 이벤트 위임을 사용하기 때문. ul 요소에 클릭 이벤트 리스너를 등록하고, 클릭된 요소가 어떤 버튼인지 $target을 통해 확인해서 적절한 동작을 수행할 수 있음
  // ul에 이벤트를 걸었지만 e.target을 통해 실제로 클릭된 요소를 알 수 있음

  if ($target.classList.contains('delete')) {
    // 삭제 버튼이 클릭된 경우
    // $target.classList.contains('delete')는 클릭된 요소가 delete 클래스를 가지고 있는지 확인하는 표현식. 만약 delete 클래스를 가지고 있다면 true를 반환하고, 그렇지 않으면 false를 반환함. 따라서 이 조건문은 삭제 버튼이 클릭되었는지를 검사하는 역할을 함
    // render() 함수에서 삭제 버튼을 생성할 때 className을 'delete'로 설정했기 때문에, 삭제 버튼이 클릭되었는지 확인하려면 $target의 클래스 리스트에 'delete'가 포함되어 있는지를 검사하면 됨
    // 삭제버튼은 li요소의 자식요소로 생성되므로, 삭제 버튼이 클릭되면 $target은 그 버튼 요소가 되고, $target.parentElement는 그 버튼의 부모 요소인 li 요소가 됨. 따라서 삭제 버튼이 클릭되었을 때 해당 li 요소의 data-index 속성에서 인덱스를 가져와서 그 인덱스에 해당하는 할 일을 todos 배열에서 제거하면 됨
    const idx = $target.parentElement.dataset.index;
    // render()함수에서 li 요소에 data-index 속성을 설정했기 때문에, 삭제 버튼이 클릭되면 $target.parentElement.dataset.index를 통해 해당 li 요소의 인덱스를 가져올 수 있음. 이 인덱스는 todos 배열에서 삭제할 할 일의 위치를 나타냄
    proxyState.todos = proxyState.todos.filter((_, i) => i !== Number(idx));
    // _는 filter 메서드에서 첫 번째 매개변수로 전달되는 요소 자체를 나타내지만, 여기서는 사용하지 않기 때문에 _로 표기함. 
    // dataset.index는 문자열로 반환되므로, Number(idx)로 숫자로 변환해서 비교해야 함. 이렇게 하면 idx에 해당하는 요소는 제거되고, 나머지 요소들은 유지됨
    // filter 메서드는 배열에서 조건에 맞는 요소들만 남겨 새로운 배열을 만드는 매서드
  }

  if ($target.tagName === 'LI' || $target.parentElement.tagName === 'LI') {
    // 할 일 항목이 클릭된 경우
    // .tagName은 요소의 태그 이름을 대문자로 변환하는 자바스크립트 속성. 예를 들어, li 요소의 tagName은 'LI'가 됨. 따라서 이 조건문은 클릭된 요소가 li 요소이거나, 클릭된 요소의 부모 요소가 li 요소인지를 검사함. 이렇게 하면 할 일 항목 자체를 클릭했을 때도, 그 안에 있는 삭제 버튼을 클릭했을 때도 모두 해당 li 요소를 찾을 수 있음
    // HTML은 대소문자 구분이 없지만 자바스크립트에서는 tagName이 항상 대문자로 반환되기 때문에, 'LI'로 비교해야 함
    // ||는 논리연산자 OR를 나타냄.
    
    const $li = $target.tagName === 'LI' ? $target : $target.parentElement;
    // 삼형연산자 (?:)를 사용해서 클릭된 요소가 li 요소인지 확인. 만약 $target.tagName이 'LI'이면 $li에 $target을 저장하고, 그렇지 않으면 $li에 $target.parentElement를 저장함. 이렇게 하면 클릭된 요소가 li 요소이든, 그 안에 있는 삭제 버튼이든 상관없이 해당 li 요소를 $li로 참조할 수 있음
    // ?앞은 , : 왼쪽은 조건이 참일 때 실행할 표현식을 나타내고, : 오른쪽은 조건이 거짓일 때 실행할 표현식을 나타냄. 따라서 이 표현식은 클릭된 요소가 li 요소인지 확인해서, li 요소가 맞으면 $li에 저장하고, 그렇지 않으면 부모 요소인 li 요소를 $li에 저장하는 역할을 함. 이렇게 하면 클릭된 요소가 li 요소이든, 그 안에 있는 삭제 버튼이든 상관없이 해당 li 요소를 $li로 참조할 수 있음
    // 클릭된 요소가 li 요소인지 확인해서, li 요소가 맞으면 $li에 저장하고, 그렇지 않으면 부모 요소인 li 요소를 $li에 저장함. 이렇게 하면 클릭된 요소가 li 요소이든, 그 안에 있는 삭제 버튼이든 상관없이 해당 li 요소를 $li로 참조할 수 있음
    //그렇지만 삭제버튼을 클릭했을 때는 handleListClick 함수에서 먼저 삭제 버튼이 클릭된 경우를 검사하기 때문에, 이 부분은 할 일 항목이 클릭된 경우에만 실행됨. 
    // 실행되면서 proxyState.todos 배열에서 해당 인덱스의 done 속성을 토글하는 코드가 실행되는데, 만약 삭제 버튼이 클릭된 경우에는 이미 해당 요소가 todos 배열에서 제거되었기 때문에, 이 부분은 실행되지 않음
    // 따라서 이 조건문에서는 삭제 버튼이 아닌 할 일 항목 자체가 클릭되었을 때의 동작을 처리하는 것임

    const idx = $li.dataset.index;
    // render() 함수에서 li 요소에 data-index 속성을 설정했기 때문에, $li.dataset.index를 통해 해당 li 요소의 인덱스를 가져올 수 있음. 이 인덱스는 todos 배열에서 완료 상태를 토글할 할 일의 위치를 나타냄

    proxyState.todos = proxyState.todos.map((todo, i) =>
      i === Number(idx) ? { ...todo, done: !todo.done } : todo
    );
    // map은 배열의 모든 요소에 조건에 맞는 함수를 적용해서 새로운 배열을 만드는 메서드
    // idx는 위에서 dataset.index로 가져온 문자열이므로, Number(idx)로 숫자로 변환해서 비교해야 함. 
    // ...todo는 기존 todo 객체를 펼쳐서 새로운 객체(전부 복사)
    // done: !todo.done은 기존 todo 객체의 done 속성 값을 반전시켜서 새로운 객체에 설정하는 표현식. 
    // done이 두 번 나오면 기존 todo 객체의 done 속성은 새로운 객체에서 덮어씌워지기 때문에, 기존 done 값이 false였다면 새로운 객체에서는 true가 되고, 기존 done 값이 true였다면 새로운 객체에서는 false가 됨. 이렇게 하면 해당 할 일의 완료 상태를 토글할 수 있음
    // 예를 들어, 기존 todo 객체의 done이 false였다면, 새로운 객체에서는 done이 true가 되고, 그 반대도 마찬가지임

  }
}

function render() {
  // state가 변경될 때마다 화면을 갱신하는 함수
  // proxyState의 set 트랩에서 호출되기 때문에, state의 todos 배열이나 filter 속성이 변경될 때마다 자동으로 render() 함수가 실행됨. 이렇게 하면 화면이 항상 최신 상태를 반영하도록 유지할 수 있음
  $list.innerHTML = '';
  // 먼저 todo-list인 ul 요소의 내용을 초기화해서, 이전에 렌더링된 할 일 항목들이 모두 제거되도록 함. 이렇게 하면 매번 render() 함수가 실행될 때마다 화면이 새로고침되는 효과를 얻을 수 있음

  const filtered = proxyState.filter === 'all'
    ? proxyState.todos
    : proxyState.todos.filter(todo => todo.tag === proxyState.filter);
    // proxyState.filter가 'all'이면 todos 배열 전체를 filtered 변수에 저장하고, 그렇지 않으면 todos 배열에서 filter 속성과 일치하는 tag를 가진 할 일만 필터링해서 filtered 변수에 저장함. 이렇게 하면 현재 선택된 필터에 따라 화면에 표시할 할 일 항목이 결정됨
    // filter 메서드는 배열에서 조건에 맞는 요소들만 남겨 새로운 배열을 만드는 메서드. 여기서는 todo.tag가 proxyState.filter와 같은 요소들만 남김

  filtered.forEach((todo, index) => {
    // filterd 배열에서 하나씩 요소를 꺼내서 todo 변수에 저장하고, 그 인덱스를 index 변수에 저장하면서 반복함. 이렇게 하면 현재 필터링된 할 일 항목들을 하나씩 처리할 수 있음
    const $li = document.createElement('li');
    // li 요소를 새로 생성해서 $li 변수에 저장함. 이렇게 하면 각 할 일 항목을 나타내는 li 요소를 동적으로 생성할 수 있음
    $li.textContent = todo.text;
    // 생성된 li 요소의 텍스트 내용을 todo.text로 설정함. 이렇게 하면 할 일 항목의 내용이 화면에 표시됨
    $li.dataset.index = index;
    // render() 함수에서 filtered 배열을 순회하면서 각 할 일 항목에 해당하는 li 요소를 생성할 때, data-index 속성을 설정해서 해당 요소의 인덱스를 저장함. 이렇게 하면 나중에 클릭 이벤트가 발생했을 때, 어떤 할 일 항목이 클릭되었는지를 쉽게 식별할 수 있음
    $li.dataset.tag = todo.tag;
    // render() 함수에서 filtered 배열을 순회하면서 각 할 일 항목에 해당하는 li 요소를 생성할 때, data-tag 속성을 설정해서 해당 요소의 태그를 저장함. 이렇게 하면 나중에 스타일링할 때 태그에 따라 다른 색상을 적용할 수 있음
    if (todo.done) $li.classList.add('done');
    // todo.done이 true이면 해당 li 요소에 done 클래스를 추가함. 이렇게 하면 완료된 할 일 항목에 대해 스타일링을 적용할 수 있음. 예를 들어, done 클래스가 적용된 요소는 텍스트에 취소선을 긋거나 색상을 변경하는 등의 스타일이 적용될 수 있음
    const $deleteBtn = document.createElement('button');
    // 버튼 태그 요소를 새로 생성해서 $deleteBtn 변수에 저장함. 이렇게 하면 각 할 일 항목에 삭제 버튼을 동적으로 생성할 수 있음
    $deleteBtn.textContent = '삭제';
    // 생성된 버튼 요소의 텍스트 내용을 '삭제'로 설정함. 이렇게 하면 삭제 버튼에 '삭제'라는 텍스트가 표시됨
    $deleteBtn.className = 'delete';
    // 생성된 버튼 요소에 delete 클래스를 설정함. 이렇게 하면 삭제 버튼에 대해 스타일링을 적용할 수 있음. 예를 들어, delete 클래스가 적용된 요소는 배경색을 빨간색으로 설정하는 등의 스타일이 적용될 수 있음
    $li.appendChild($deleteBtn);

    $list.appendChild($li);
    // ul 요소에 생성된 li 요소를 추가함. 이렇게 하면 화면에 할 일 항목이 표시됨
  });

  document.querySelectorAll('.filter button').forEach($btn => {
    $btn.classList.toggle('active', $btn.dataset.tag === proxyState.filter);
  });
  // 먼저 querySelectorAll('.filter button')를 사용해서 필터 버튼들을 모두 선택한 후, $btn에 담고 forEach로 순회하면서 각 버튼에 대해 classList.toggle() 메서드를 사용해서 active 클래스를 토글함.
  // $btn.classList.toggle('active', condition) 표현식은 condition이 true이면 active 클래스를 추가하고, condition이 false이면 active 클래스를 제거하는 역할을 함. 여기서는 $btn.dataset.tag가 proxyState.filter와 같은지 비교해서, 현재 선택된 필터에 해당하는 버튼에만 active 클래스를 적용하도록 함. 이렇게 하면 현재 선택된 필터 버튼이 시각적으로 구분되어 사용자에게 어떤 필터가 적용되고 있는지를 명확하게 보여줄 수 있음
}


// 3.로컬스토리지 저장/불러오기 함수
function saveToStorage() {
  const plainTodos = proxyState.todos.map(({ text, tag }) => ({ text, tag }));
  // plainTodos 배열은 proxyState.todos 배열에서 각 할 일 객체의 text와 tag 속성만 뽑아서 새로운 객체를 만들어서 저장한 배열임

  localStorage.setItem('todos', JSON.stringify(plainTodos));
  // localStorage.setItem() 메서드를 사용해서 'todos'라는 키로 plainTodos 배열을 JSON 문자열로 변환해서 저장함. 
  // JSON.stringify() 메서드는 자바스크립트 객체를 JSON 문자열로 변환하는 역할을 함. 이렇게 하면 할 일 항목들이 로컬스토리지에 저장되어, 페이지를 새로고침하거나 브라우저를 닫았다가 다시 열어도 이전에 저장된 할 일 항목들을 불러올 수 있음
  // JSON은 자바스크립트 데이터를 문자열로 표현하는 포맷으로 객체나 배열을 문자열로 변환해서 저장하거나, 문자열로 표현된 JSON 데이터를 다시 자바스크립트 객체나 배열로 변환해서 사용할 수 있음. localStorage는 문자열만 저장할 수 있기 때문에, 객체나 배열을 저장하려면 JSON.stringify()를 사용해서 문자열로 변환해야 함
  // 이렇게 하면 할 일 항목들이 로컬스토리지에 저장되어, 페이지를 새로고침하거나 브라우저를 닫았다가 다시 열어도 이전에 저장된 할 일 항목들을 불러올 수 있음
}

function loadFromStorage() {

  const raw = localStorage.getItem('todos');
  // localStorage.getItem() 메서드를 사용해서 'todos'라는 키로 저장된 값을 가져와서 raw 변수에 저장함. 이렇게 하면 로컬스토리지에 저장된 할 일 항목들을 불러올 수 있음. 만약 'todos'라는 키로 저장된 값이 없다면 raw는 null이 됨
  if (!raw) return;
  // raw가 null이거나 빈 문자열인 경우에는 로컬스토리지에 저장된 할 일 항목이 없다는 의미이므로, 함수 실행을 종료함. 이렇게 하면 로컬스토리지에 저장된 데이터가 없는 경우에도 오류 없이 정상적으로 동작할 수 있음
  try {
    const loaded = JSON.parse(raw);
    // JSON.parse() 메서드를 사용해서 raw 문자열을 자바스크립트 객체로 변환함. 이렇게 하면 로컬스토리지에 저장된 할 일 항목들을 다시 자바스크립트 객체로 사용할 수 있음. 만약 raw가 유효한 JSON 문자열이 아니라면, JSON.parse()는 오류를 발생시키므로, try-catch 블록으로 감싸서 오류를 처리함
    proxyState.todos = loaded.map(todo => ({ ...todo, done: false }));
    // 위에서 JSON.parse()로 변환된 loaded 배열에서 각 할 일 객체에 대해 done 속성을 false로 설정한 새로운 객체를 만들어서 todos 배열에 저장함. 
    // proxyState.todos 배열을 업데이트하면 Proxy의 set 트랩이 발동하여 화면이 자동으로 업데이트되고, 변경된 상태가 로컬스토리지에도 저장됨. 이렇게 하면 로컬스토리지에서 불러온 할 일 항목들이 화면에 표시되고, 완료 상태는 초기화되어 false로 설정됨
  } catch (e) {
    console.error('로컬스토리지 불러오기 실패', e);
    // JSON.parse()에서 오류가 발생한 경우, catch 블록이 실행되어 오류 메시지를 콘솔에 출력함. 이렇게 하면 로컬스토리지에서 데이터를 불러오는 과정에서 문제가 발생했을 때, 그 원인을 파악하는 데 도움이 될 수 있음
  }
}
