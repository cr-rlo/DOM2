<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="alert('클릭되었습니다')">버튼</button>

    <script>
      const button = document.querySelector("button");
      button.onclick = function () {
        alert("클릭됨");
      };

      const button = document.querySelector("button");

      button.onclick = () => alert("첫 번째 핸들러");
      button.onclick = () => alert("두 번째 핸들러"); // 이게 실행됨

      // -----------------
      const button = document.querySelector("button");

      button.addEventListener("click", () => {
        alert("첫 번째 핸들러");
      });

      button.addEventListener("click", () => {
        alert("두 번째 핸들러");
      });
    </script>
  </body>
</html>
