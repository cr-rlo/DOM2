<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동적 UI 관리</title>
  <style>
    .done {
      color: gray;
      text-decoration: line-through;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>💬 할 일 목록</h2>
    <input type="text" id="todoInput" placeholder="할 일을 입력하세요" />
    <button id="addItem">할 일 추가</button>
    <ul id="todoList"></ul>
  </div>

  <script>
    const input = document.getElementById("todoInput");
    const addItemBtn = document.getElementById("addItem");
    const todoList = document.getElementById("todoList");


    let todos = []; // 할 일 데이터를 저장할 배열
    let idCounter = 1; // 할 일마다 고유 번호를 부여할 카운터
    // 위 배열과 카운터는 할 일 데이터를 관리하기 위해 생성
    // 눈으로는 보이지않지만, 자바스크립트 메모리 안에만 존재하면서 할 일의 고유값과 내용을 저장하는 역할을 함

    addItemBtn.addEventListener("click", addTodo);
    function addTodo(e){
      const todoText = input.value.trim();
      if (todoText === "") {
        alert("할 일을 입력하세요.");
        return; // 입력값이 비어있으면 경고창을 띄우고 함수 실행을 중단
      };

      const newTodo = {
        id: idCounter++, // 고유번호 부여 후 1씩 증가
        todoText, // 할 일 내용
        done: false //완료 상태 초기값 false로 설정
      };
      
      todos.push(newTodo); // 할 일 데이터를 배열에 저장
      renderTodo(newTodo); // 할 일 목록을 화면에 구현하는 함수
      input.value = ""; // 입력창 초기화
    };

    function renderTodo(Todo){//newTodo 객체를 매개변수로 받아서 화면에 구현하는 함수.즉 newTodo와 Todo는 같은 객체를 가리킴
      const li = document.createElement("li");
      // li 요소를 새로 만들어서 할 일 목록에 추가할 준비를 함

      li.innerHTML = `<p class="todo-text">${Todo.todoText}</p>
      <button class="done-btn" data-action="done" data-id="${Todo.id}">✅ 완료</button>
      <button class = "important-btn" data-action="important" data-id="${Todo.id}">⭐ 중요</button>
      <button class = "delete=btn" data-action="delete" data-id="${Todo.id}">❌ 삭제</button>`;

      // li 요소의 내부 HTML을 설정하여 할 일 내용과 완료 버튼을 포함하도록 함
      // 완료 버튼에는 data-id 속성을 추가하여 할 일의 고유 번호를 저장함 -> 나중에 완료 상태를 변경할 때 어떤 할 일이 눌렸는지 식별하기 위해 필요

      todoList.appendChild(li);
    };


    todoList.addEventListener("click", manageTodo);
    function manageTodo(e){
      const target = e.target; // 클릭된 요소를 가져옴
      if (target.dataset.action === "done") {
        const id = parseInt(target.dataset.id);// 완료 버튼의 data-id 속성에서 할 일의 고유 번호를 가져옴
        const Todo = todos.find(function(n){return n.id === id}); // 할 일 배열에서 고유 번호가 일치하는 할 일 객체를 찾음. 즉 요소 반환
        // 완료 버튼은 객체 자체가 필요 하기 때문에 find 메서드를 사용하여 해당 객체를 찾아서 Todo 변수에 할당함
        // n은 배열의 각 요소를 나타내는 매개변수, n.id는 배열의 요소 중에서 id 속성을 나타냄
        // n.id는 배열 안 댓글의 id, id는 좋아요 버튼의 data-id에서 가져온 고유 번호, 이 둘이 일치하는 댓글 객체를 찾음
        Todo.done = !Todo.done; // 할 일의 완료 상태를 토글(반전)시킴
        target.parentNode.classList.toggle("done"); // 완료 버튼의 클래스 목록에서 "done" 클래스를 토글하여 스타일 변경
      target.textContent = Todo.done ? "❌ 미완료" : "✅ 완료"; // 완료 상태에 따라 버튼의 텍스트를 변경
      } 
      else if (target.dataset.action === "delete") {
        const id = parseInt(target.dataset.id);
        const index = todos.findIndex(function(n){return n.id === id});
        // findIndex 메서드는 배열에서 조건에 맞는 요소의 인덱스를 반환하는 메서드
        // 삭제는 객체 자체가 아니라 배열에서 해당 객체를 제거하는 것이기 때문에 findIndex 메서드를 사용하여 해당 객체의 인덱스를 찾아서 index 변수에 할당함
        // 몇 번째에 있는지 위치가 필요하기 때문. splice는 배열에서 요소를 제거할 때 인덱스가 필요하기 때문
        if (index !== -1) { //해당 인덱스가 존재하면 1
          todos.splice(index, 1); // 배열에서 해당 할 일 객체를 제거. index위치에서 1개 삭제라는 의미
          target.parentNode.remove(); // 화면에서 해당 할 일 요소를 제거. target.parentNode는 완료 버튼의 부모 요소인 li 요소를 가리킴, remove() 메서드는 해당 요소를 DOM에서 제거하는 메서드
        }
      }
      else if (target.dataset.action === "important"){
        if (target.classList.contains("important")){ 
          target.classList.remove("important");
          todoList.appendChild(target.parentNode); // li 요소를 부모 요소의 마지막 자식으로 이동시킴.即, 중요 표시가 해제된 할 일이 목록의 맨 아래로 이동하게 됨
        } else { 
          target.classList.add("important");
          todoList.insertBefore(target.parentNode, todoList.firstChild); // li 요소를 부모 요소의 첫 번째 자식으로 이동시킴. 중요 표시된 할 일이 목록의 맨 위로 이동하게 됨
          // insertBefore 메서드는 첫 번째 매개변수로 지정된 요소를 두 번째 매개변수로 지정된 요소 앞에 삽입하는 메서드. 즉, target.parentNode 요소를 todoList.firstChild 요소 앞에 삽입함
        }
      };
    };


  </script>
</body>
</html>
