<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알림 카드 인터페이스</title>
  <style>
    .card{
      display: flex;
      align-items: center;
      justify-content: space-between; /* flex컨테이너 안에서 요소들을 가로로 정렬하는 속성
      따라서 display: flex;가 필요
      특히 space-between은 양끝에 붙고 나머지를 균등 배치함 */
      border-radius: 8px;
      padding: 10px;
      border: 1px solid #ccc;
      margin-bottom: 5px;
    }
    .checked{
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>
  <button id="add-alert">새 알림 추가</button>
<ul id="notification-list">
  <li class="card">
    <a href="#" class="title">[공지] 서비스 점검 안내</a>
    <button class="pin" data-action="pin">📌</button>
    <button class="remove" data-action="delete">🗑</button>
    <button class="mark" data-action="check">✔️</button>
  </li>
  <li class="card">
    <a href="#" class="title">[알림] 이용약관 변경</a>
    <button class="pin" data-action="pin">📌</button>
    <button class="remove" data-action="delete">🗑</button>
    <button class="mark" data-action="check">✔️</button>
  </li>
</ul>

<script>
  const list = document.getElementById("notification-list"); //ul요소 변수로 선언
  const button = document.getElementById("add-alert"); //버튼 요소 변수로 선언

  let count = 1;

  button.addEventListener("click", () => {
    const li = document.createElement("li");
    li.className = "card";
    li.innerHTML = `
      <a href="#" class="title">[알림] 새로운 알림 ${count++}</a>
      <button class="pin" data-action="pin">📌</button>
      <button class="remove" data-action="delete">🗑</button>
      <button class="mark" data-action="check">✔️</button>
    `;
    list.appendChild(li);
  });

  list.addEventListener("click", (e)=>{
    const card = e.target.closest(".card")
    if(e.target.dataset.action == "pin") {
      list.prepend(card);
      console.log("🔝 고정됨");
  }
    else if(e.target.dataset.action == "delete"){
      card.remove();
    }
  
    else if(e.target.dataset.action == "check"){
      card.classList.toggle("checked");
      console.log("✅ 확인됨");

    }
    else if(e.target.classList.contains("title")){
      e.preventDefault();
      console.log("🔍 상세 보기")
    }

    else{
      console.log("🔍 상세 보기")
    }

  });


</script>
</body>
</html>
