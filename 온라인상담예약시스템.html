<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>상담예약</title>
    <style>
      form {
        max-width: 400px;
        margin: 20px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: sans-serif;
      }

      label {
        display: block;
        margin-bottom: 15px;
      }

      input,
      select,
      textarea {
        display: block;
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        border: 2px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
      }

      .hint {
        display: block;
        margin-top: 5px;
        font-size: 13px;
        color: #555;
      }

      input.valid,
      select.valid,
      textarea.valid {
        border-color: green;
      }

      input.invalid,
      select.invalid,
      textarea.invalid {
        border-color: red;
      }

      button {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:disabled {
        background-color: #aaa;
        cursor: not-allowed;
      }

      #result-message {
        text-align: center;
        font-weight: bold;
        margin-top: 20px;
        color: #2c3e50;
      }
    </style>
  </head>
  <body>
    <form id="consult-form" novalidate>
      <!-- novalidate는 브라우저의 기본 유효성 검사를 끄는 속성 -->
  <label>
    상담 종류:
    <select name="type" required>
      <option value="">선택하세요</option>
      <option value="financial">금융 상담</option>
      <option value="medical">의료 상담</option>
      <option value="legal">법률 상담</option>
    </select>
    <span class="error-message" id="type-error" aria-live="polite"></span>
  </label>

  <label>
    상담 날짜:
    <input type="date" name="date" disabled />
    <span class="error-message" id="date-error" aria-live="polite"></span>
  </label>

  <label>
    상담 시간:
    <input type="time" name="time" disabled />
    <span class="error-message" id="time-error" aria-live="polite"></span>
  </label>

  <label>
    이름:
    <input type="text" name="name" maxlength="10" />
    <span class="char-count" id="name-count">0 / 10</span>
    <span class="error-message" id="name-error" aria-live="polite"></span>
  </label>

  <label>
    상담 목적:
    <textarea name="purpose" rows="3" placeholder="선택 사항입니다."></textarea>
    <span class="error-message" id="purpose-hint" aria-live="polite"></span>
  </label>

  <label>
    <input type="checkbox" name="agree" />
    개인정보 수집 및 이용에 동의합니다.
    <span class="error-message" id="agree-error" aria-live="polite"></span>
  </label>

  <button type="submit" disabled>상담 예약하기</button>
</form>

<p id="result-message"></p>


  <script>
    const form = document.getElementById("consult-form");
      // 폼 안에 있는 요소들을 다루거나 폼 자체에 이벤트를 걸기 위해서 form에 접근
     const fields = {
      type: form.type,
      date: form.date,
      time: form.time,
      name: form.name,
      purpose: form.purpose,
      agree: form.agree,
     };
    // form안의 필드들을 객체로 한번에 묶어서 코드 중복을 줄이고 재사용성 높임
    const errors = {
      type: document.getElementById("type-error"),
      date: document.getElementById("date-error"),
      time: document.getElementById("time-error"),
      name: document.getElementById("name-error"),
      purpose: document.getElementById("purpose-hint"),
      agree: document.getElementById("agree-error"),
     };
    // form안의 에러들을 객체로 한번에 묶어서 코드 중복을 줄이고 재사용성 높임

    const submitBtn = form.querySelector("button");
    // 제출 버튼 가져오기

    const resultMessage = document.getElementById("result-message");
    // 완료 메세지 가져오기
      
    const validationState = {
      type: false,
      date: false,
      time: false,
      name: false,
      purpose: false,
      agree: false,
    };
    // 각 입력 필드의 유효 여부를 추적하는 전역 상태 객체. 버튼 활성화 여부 판단에 사용됨
    // 전역 상태 객체란 함수 밖에서 현재 유효한지 아닌지 등의 값을 나타내는 상태를 객체 {}로 묶어서 관리하도록 선언한 것




    // 1. 상담 종류 전택(select)
    fields.type.addEventListener("change", () => {
      if(fields.type.value !== "" ){
        errors.type.textContent = "✅ 상담 종류 선택 완료";
        setValid("type");
        fields.date.disabled = false;
        fields.time.disabled = false;
      }
      else{
        errors.type.textContent = "❌ 상담 종류를 선택해주세요.";
        setInvalid("type");
        fields.date.disabled = true;
        fields.time.disabled = true;
      }
      updateSubmitState();
    });

    // 2. 상담 날짜 선택
    fields.date.addEventListener("blur", () => {
      const today = new Date().toISOString().split("T")[0];

      if (fields.date.value >= today){
        errors.date.textContent = "✅ 유효한 날짜입니다.";
        setValid("date");
      } else {
        errors.date.textContent = "❌ 날짜를 확인해주세요.";
        setInvalid("date");
      }
      updateSubmitState();
     });

    // 3. 상담시간 입력 
    fields.time.addEventListener("input", () => {
      const timeValue = fields.time.value;
      if (timeValue >= "09:00" && timeValue <= "18:00") {
        errors.time.textContent = "✅ 유효한 시간입니다.";
        setValid("time");}
        else{
          errors.time.textContent = "❌ 상담 가능 시간은 09:00 ~ 18:00입니다.";
          setInvalid("time");
        }
      updateSubmitState();
     });

    // 4. 상담자 이름 입력
    fields.name.addEventListener("input", () => {
      fields.name.value.maxLength = 10;
      const nameLength = fields.name.value.trim().length;

      if (nameLength >= 2){
        errors.name.textContent = `✅ ${nameLength}자 입력됨`;
        setValid("name");
      } else {
        errors.name.textContent = "❌ 이름은 2자 이상 입력해주세요.";
        setInvalid("name");
      }

      updateSubmitState();
     });

    // 5. 상담 목적 입력
    fields.purpose.addEventListener("focus", () => {
      errors.purpose.textContent = "상담목적은 선택 입력입니다.";
    });
    fields.purpose.addEventListener("blur", () => {
      errors.purpose.textContent = "";
    });

    // 6. 약관 동의
    fields.agree.addEventListener("change", ()=>{
      if(fields.agree.checked){
        errors.agree.textContent = "✅ 동의 완료";
        setValid("agree");
      }
      else{
        errors.agree.textContent = "❌ 동의가 필요합니다.";
        setInvalid("agree");
      }
      updateSubmitState();
    });




    // 상태 표시 함수들
    //  유효/무효 표시 함수 -> 시각적 피드백과 validationState 업데이트 동시 처리
    function setValid(key) {
      fields[key].classList.add("valid");
      fields[key].classList.remove("invalid");
      validationState[key] = true;
    }
    function setInvalid(key) {
      fields[key].classList.add("invalid");
      fields[key].classList.remove("valid");
      validationState[key] = false;
    }
      

    //제출 버튼 활성화 조건 확인
    function updateSubmitState() {
      const allValid = Object.values(validationState).every(Boolean);
      submitBtn.disabled = !allValid;
    }
    // validationState의 값들을 배열로 꺼내기
    // Object.values()가 객체를 배열로 변환해주는 함수. .every()가 배열 메서드라서 
    // .evert(Boolean)으로 전부 true인지 확인
    // 전부 true가 아니면 submitBtn 비활성화

    // 엔터 키로 다음 필드 이동 + 마지막에서 submit 실행
    form.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const focusables = [
          ...form.querySelectorAll("select, input, textarea"),
        ];
        // 폼 안에 있는 모든 가능ㅎ나 요소들을 가져온 nodeList를 펼쳐서 배열로 변환

        const current = document.activeElement;
        // 지금 포커스가 있는 요소를 의미함
        // activeElement는 현재 포커스 된 요소를 반환해줌
        const idx = focusables.indexOf(current);
        // indexOf는 배열에서 특정 요소가 몇 번째인지 알려주는 함수
        // 이때문에 위에서 배열로 변환한 것
        // 현재 포커스 된 요소가 몇 번째 인덱스인지를 가져와서 idx에 저장
        // 없으면 -1을 반환

        if (idx >= 0 && idx < focusables.length - 1) {
          e.preventDefault();
          focusables[idx + 1].focus();
        } // 현재 요소가 배열 안에 있고 마지막 인덱스가 아니면 다음 요소로 포커스
        else if (idx === focusables.length - 1 && !submitBtn.disabled) {
          e.preventDefault();
          form.requestSubmit();
        } // 마지막 요소이고, 버튼이 활성화되어 있으면 requestSubmit함수 호출
        // form.submit으로 제출하면 아래에 등록할 이벤트를 무시하고 제출해버림 
       }
      });

    // submit 이벤트 처리
    // form.addEventListener("submit", (e) => 은 제출할 때 실행할 코드를 등록하는 것
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const firstInvalidKey = Object.keys(validationState).find(
        (key) => !validationState[key]
      );
      // Object.keys는 Object.values()와 반대로 키만 뽑아오는 함수
      // find()는 괄호 안 조건에 맞는(true가 되는) 첫 번째 값을 배열에서 반환하는 것
      // 여기서 조건은 (key) => !validationState[key]의 화살표 함수
      // !validationState[key]는 false 값이 있으면 true를 반환하여 그 값을 find가 찾음
      // 즉 상태가 false인 값의 key가 firstInvalidKey에 저장됨

      if (firstInvalidKey) {
        fields[firstInvalidKey].focus();
        return;
        // 유효하지 않은 값으로 포커스
      }
      resultMessage.textContent = "🎉 신청 완료!";
      form.reset();
      // input값의 value를 비워주는 것

      // 상태 초기화
      Object.keys(validationState).forEach((k) => {
        validationState[k] = false;
        fields[k].classList.remove("valid", "invalid");
        errors[k].textContent = "";
      });
      submitBtn.disabled = true;
    });
  </script>
  </body>
</html>
