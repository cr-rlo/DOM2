<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input id="nameInput" placeholder="이름을 입력하세요" />
  <button id="generateBtn">프로필 생성</button>

  <div id="profileBox" style="position: relative; padding: 50px; border: 1px solid #ccc; margin-top: 30px;">
  🧑 사용자 프로필
  </div>

<script>

  let toolTip = null; // 툴팁 요소를 처음에 null로 초기화해둬야 툴팁이 존재하는지 여부를 쉽게 확인할 수 있음, 전역으로 toolTip 변수를 선언하겠다는 의미
  
  const input = document.getElementById("nameInput");

  const profileBox = document.getElementById("profileBox");

  const generateBtn = document.getElementById("generateBtn");
  
  // [1] 키보드 입력 감지
  input.addEventListener("keydown", keyDown);

  function keyDown(e){
    console.log("입력된 키:", e.key);
  };

  // [2] 복사 방지 처리
  document.addEventListener("copy", prevent);

  function prevent(e){
    e.preventDefault();
    alert("복사 금지입니다.");
  };

  // [3] 버튼 클릭 시 단 1회만 실행
  generateBtn.addEventListener("click", generateProfile, { once: true });

  function generateProfile(){
    alert("랜덤 프로필 생성 완료!");
    input.value = "";
  };

  
  // [4-1] 툴팁 생성
  function showTooltip(e){
    if (toolTip != null) return;// 이미 툴팁이 존재하면 생성하지 않음

    console.log("툴팁 이벤트 등록됨"); // return에 걸리지 않음.툴팁을 생성할 때마다 콘솔에 로그 출력 -> 디버깅용

    toolTip = document.createElement("div"); //null이었던 toolTip return하지 않고 div요소로 새롭게 할당

    toolTip.textContent = "프로필 이미지 입니다";
    toolTip.className = "toolTip";// 스타일링을 위해 클래스 이름도 지정

    // 툴팁 스타일링
    toolTip.style.position = "absolute";
    toolTip.style.backgroundColor = "black";
    toolTip.style.color = "white";
    toolTip.style.padding = "5px";
    toolTip.style.borderRadius = "5px";
    toolTip.style.pointerEvents = "none"; // 툴팁이 마우스 이벤트를 방해하지 않도록 설정. 툴팁을 마우스 이벤트에서 제외시킴


    profileBox.appendChild(toolTip);

    moveHandler = moveTooltip;
    profileBox.addEventListener("mousemove", moveHandler);

    moveHandler(e); // 툴팁이 생성되자마자 마우스 위치에 나타나도록 함


  };


    
  // [4-2] 툴팁 위치 이동
  function moveTooltip(e){
    toolTip.style.left = `${e.clientX}px`;
    toolTip.style.top = `${e.clientY}px`;
  };

  // [4-3] 툴팁 제거
  function hideTooltip(e){
    if (toolTip == null) return;

    toolTip.remove();
    toolTip = null; // 툴팁이 제거되었으므로 다시 null로 초기화

    if (moveHandler) {
      profileBox.removeEventListener("mousemove", moveHandler);
      moveHandler = null; // moveHandler도 초기화
      console.log("툴팁 이벤트 제거됨");}
  };

  // 리스너 등록
  profileBox.addEventListener("mouseenter", showTooltip);
  profileBox.addEventListener("mouseleave", hideTooltip);


</script>
</body>
</html>
