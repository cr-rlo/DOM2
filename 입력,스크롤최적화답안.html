<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이벤트 최적화 미션</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    input[type="text"]{
      padding: 10px;
      font-size: 16px;
      width: 300px;
      border: 2px solid #ccc;
      border-radius: 4px;

    }

    #results{
      list-style: none; 
      padding: 0; /* 검색 결과의 기본 스타일 제거 */
      margin-top: 10px; /* 검색 결과와 입력창 사이의 간격을 위해 margin-top 추가 */
      width: 300px; /* 검색 결과의 너비를 입력창과 맞추기 위해 width 추가 */
      border: 1px solid #ddd /* 검색 결과를 구분하기 위한 테두리 추가 */;
      border-radius: 4px; /* 검색 결과의 테두리를 둥글게 만들기 위해 border-radius 추가 */
      background-color: #fff; /* 검색 결과의 배경색을 흰색으로 설정 */

    }

    #results li{
      padding: 8px 12px; /* 검색 결과 항목의 패딩을 추가하여 가독성 향상 */
      border-bottom: 1px solid #eee; /* 검색 결과 항목 사이에 구분선을 추가하여 가독성 향상 */
    }
    #results li:last-child{
      border-bottom: none; /* 마지막 검색 결과 항목의 구분선을 제거하여 깔끔한 디자인 유지 */
    }
    
    #results mark{
      background-color: yellow; /* 검색어를 강조하기 위해 배경색을 노란색으로 설정 */
      font-weight: bold; /* 검색어를 더 눈에 띄게 하기 위해 글자 두껍게 설정 */
    }

    section.scroll-section{
      margin-top: 50px;
      /* 스크롤 박스 섹션과 검색창 섹션 사이의 간격을 위해 margin-top 추가 */
    }

    #scroll-box{
      background-color: #f9f9f9;
      /* 스크롤 박스의 배경색을 연한 회색으로 설정하여 시각적으로 구분 */
      height: 1500px;
      /* 스크롤 박스의 높이를 충분히 크게 설정하여 스크롤이 발생하도록 함 */
    }
    p{
      position: fixed;/* 스크롤해도 항상 화면 상단에 고정되도록 position: fixed; 사용 */
      top: 10px; /* 화면 상단에서 10px 떨어진 위치에 고정 */
    }

  </style>

</head>
<body>
  <h2>이벤트 성능 최적화 미션</h2>
  <section>
    <label for = "search">검색창 (debounce + 자동완성) </label><br />
    <input type = "text" id = "search" placeholder = "검색어를 입력하세요" autocomplete="off"/> 
    <!-- autocomplete="off"는 브라우저의 자동완성 기능을 끄는 속성. 검색창에서 이전에 입력한 검색어가 자동으로 제안되는 것을 방지하기 위해 사용. -->
    <ul id = results></ul>
  </section>
  <!-- 위 section은 검색창 section-->
  

  <section class = "scroll-section"> <!-- 아래 section은 스크롤 박스 section -->
    <div id = scroll-box>
      <p>⬇️ 아래로 스크롤하면 색상이 바뀝니다</p>
    </div>
    
  </section>
  
  
  <script>
  // 검색어 자동완성 기능을 위한 키워드 배열
    const keywords = [
  "JavaScript", "Java", "Python", "React", "Vue", "Angular",
  "Node.js", "Express", "TypeScript", "HTML", "CSS", "Django",
  "Flask", "Next.js", "Nuxt.js", "Tailwind", "Bootstrap", "Webpack",
  "Vite", "MongoDB", "MySQL", "PostgreSQL", "GraphQL", "REST API",
  "DOM", "EventListener", "throttle", "debounce", "async", "await"
];
    // DOM 요소 가져오기
    const searchInput = document.getElementById("search");
    // 검색창 요소를 가져와서 searchInput 변수에 저장
    const results = document.getElementById("results");
    // 검색 결과를 표시할 요소를 가져와서 results 변수에 저장


    // debounce 함수 정의
    function debounce (func, delay = 500){
      let timer;
      return function(...args){
      clearTimeout(timer);
      timer = setTimeout(()=>
        func(...args), delay);
      }
    };

    // throttle 함수 정의
    function throttle(func, delay = 200){
      let lastTime = 0;
      return(...args) => {
        const now = Date.now();
        if(now - lastTime >= delay){
          func(...args);
          lastTime = now;
        }
      }
    };

    // 다른 방식의 throttle 함수 정의
    /* function throttle(func, delay) {
      let waiting = false;
      // 지금 기다리는 중인지 표시하는 변수
      // false면 기다리지 않는 상태, true면 기다리는 상태
      return function (...args) {
        if (!waiting) {
          func.apply(this, args);
          waiting = true;
          setTimeout(() => {
            waiting = false;
          }, delay);
        }
      };
      // return은 throttle 함수가 호출될 때마다 새로운 함수를 반환하는 역할을 함
      // 반환된 함수는 func를 호출하는 역할을 하며, waiting 변수를 사용하여 func가 호출된 후 일정 시간 동안 다시 호출되지 않도록 제어함
    };*/

    // 검색 필터 함수(입력값 포함 여부 + 하이라이팅)
    function searchKeywords(value) {
      results.innerHTML = "";
      // 검색할 때마다 검색 결과를 초기화
      if (value.trim() === "") return;
      // 입력값이 비어있으면 검색하지 않고 함수 종료
      
      const filtered = keywords.filter(word =>
        word.toLowerCase().includes(value.toLowerCase())
      );
      // keywords 배열에서 입력값을 포함하는 단어들을 필터링. 대소문자 구분 없이 검색하기 위해 toLowerCase() 사용
      // word.toLowerCase().includes(value.toLowerCase())는 각 단어를 소문자로 변환한 후 입력값도 소문자로 변환해서 포함 여부를 검사하는 조건문인데 이를 만족하는 단어들만 keywords 배열에서 추출해서 filtered 배열에 저장

      if (filtered.length === 0) {
        const li = document.createElement("li");
        li.textContent = "검색 결과가 없습니다.";
        results.appendChild(li);
        return;
        // 필터링된 결과가 없으면 "검색 결과가 없습니다."라는 메시지를 표시하고 함수 종료
        
      }

      filtered.forEach(word => {
        // filtered 배열에서 하나씩 단어를 꺼내서 word 변수에 저장하면서 반복
        const li = document.createElement("li");
        // 검색 결과 항목을 표시할 li 요소를 생성
        const regex = new RegExp(`(${value})`, "gi");
        // 정규식이란 문자열에서 특정 패턴을 찾기 위한 도구. 여기서는 입력값(value)을 포함하는 부분을 찾기 위해 정규식을 사용. g는 전체 검색, i는 대소문자 구분 없이 검색하라는 의미
        const highlighted = word.replace(regex, "<mark>$1</mark>");
        // word에서 입력값을 포함하는 부분을 <mark> 태그로 감싸서 하이라이팅. replace()는 문자열에서 regex 패턴에 맞는 부분을 "<mark>$1</mark>"로 대체하는 역할을 함. $1은 regex에서 괄호로 묶인 부분(입력값)을 참조하는 역할을 함
        li.innerHTML = highlighted;
        // li 요소의 내부 HTML을 하이라이팅된 단어로 설정
        results.appendChild(li);
        // li 요소를 검색 결과 목록에 추가
      });
    }


    // 입력 이벤트 연결 + debounce 적용

    searchInput.addEventListener("input", debounce (()=>{
      searchKeywords(searchInput.value);
      console.log("🔎 검색 실행:", searchInput.value);
    }, 500));

    // 스크롤 이벤트
    const scrollBox = document.getElementById("scroll-box");

    const color = ["red", "green", "blue", "yellow", "purple"];
     let index = 0;
    

    window.addEventListener( "scroll", throttle(()=>{
        console.log("스크롤 이벤트 발생");
        changeBackgroundColor();
    }, 200 ));

    function changeBackgroundColor(){
     
     index++;
     if (index >= color.length) index = 0;
     scrollBox.style.backgroundColor = color[index];
     console.log("📜 스크롤 처리");

    };



  </script>
</body>

</html>
