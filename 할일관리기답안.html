<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동적 UI 관리</title>
  <style>
    .done {
      color: gray;
      text-decoration: line-through;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="addItem">할 일 추가</button>
    <ul id="todoList"></ul>
  </div>


<script>
  const list = document.getElementById("todoList");
  const addBtn = document.getElementById("addItem");

  let count = 1;

// 1. 항목 추가 버튼 클릭 시 새로운 li 삽입
  addBtn.addEventListener("click", () => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span class="text">할 일 ${count++}</span>
      <button data-action="complete">완료</button>
      <button data-action="delete">삭제</button>
      <button data-action="important">⭐</button>
    `;
    // 할 일 추가
    // 각각 별도로 이벤트를 붙이지 않고 중앙 이벤트 위임 구조에서 일괄 제어할 준비를 함
    // HTML 문자열을 li.innerHTML로 바로 넣는 이유는 DOM 조립 과정을 간단하게 하기 위함

    list.appendChild(li);
  });

// 2. 이벤트 위임 - ul에만 리스너 등록
  list.addEventListener("click", (event) => {
    const target = event.target;
    // event.target으로 실제로 클릭된 버튼 감지

  // 버튼이 아닌 요소 클릭 시 무시
    if (target.tagName !== "BUTTON") return;

    const li = target.closest("li");
    // 클릭된 버튼과 가장 가까운 항목. 즉 현재 클릭된 버튼이 속한 항목 찾기
    const action = target.dataset.action;
    // 버튼의 역할 분기


    // switch문으로 버튼의 역할에 따라 다른 동작 수행
    // switch 문은 여러 경우의 수를 처리할 때 유용한 제어문으로, if-else 문보다 가독성이 좋고 구조적으로 명확하게 작성할 수 있음
    switch (action) {
      case "complete":
        li.classList.toggle("done");
        break;
      // break 문은 switch 문에서 각 case 블록의 끝에 위치하여 해당 case가 실행된 후 switch 문을 빠져나가도록 하는 역할을 함. break 문이 없으면 다음 case 블록들도 연속적으로 실행되는 "fall-through" 현상이 발생할 수 있음
      case "delete":
        li.remove();
        break;

      case "important":
      // 이미 중요 표시된 항목이면 다시 아래로 내림
        if (li.classList.contains("important")) {
          li.classList.remove("important");
          list.appendChild(li); // 맨 뒤로 이동
        } else {
         li.classList.add("important");
         list.insertBefore(li, list.firstElementChild); // 맨 위로 이동
        }
        break;
    }
  });

// 3. 스타일 적용
  const style = document.createElement("style");
  // createElement 메서드의 매개변수로는 HTML 태그 이름이 들어감. 즉, "style"이라는 태그를 새로 만들어서 style 변수에 할당함
  style.textContent = `
    .done .text {
      text-decoration: line-through;
      color: gray;
    }

    .important {
      background: #fffacd;
    }

    li {
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }

    button {
      margin-left: 6px;
    }
  `;
  document.head.appendChild(style);
  </script>
</body>
</html>
